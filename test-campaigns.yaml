logging:
  level: trace
  span_sample_rate: 0.1
  sinks:
    - type: stdout

ssl:
  selfsigned:
    hosts:
      - localhost

notifications:
  ttl: 30m
  domain: localhost
  billing_path: /billing

schain_limit: 4

publishers:
  - id: test_pub
    domain: testpub.local
    seller_type: Publisher
    enabled: true
    name: Test Publisher
    margin: 15

bidders:
  - bidder:
      id: test_bidder
      name: Test Bidder
    endpoints:
      - id: east_ep
        enabled: true
        name: East Endpoint
        url: http://localhost:8080/bid
        qps: 10
        shaping: { type: none }
        targeting: {}

buyers:
  - id: test_buyer
    buyer_name: Test Buyer
    status: Active

advertisers:
  - id: adv_alpha
    buyer_id: test_buyer
    brand: Alpha Brand
    domain: alphabrand.com
  - id: adv_beta
    buyer_id: test_buyer
    brand: Beta Brand
    domain: betabrand.com

campaigns:
  - id: camp_1
    status: Active
    buyer_id: test_buyer
    name: Dollar Campaign
    advertiser_id: adv_alpha
    budget: 100.0
    budget_type: Daily
    pacing: Fast
    strategy:
      FixedPrice: 1.0
    start_date: "2026-02-27T00:00:00Z"
    end_date: "2026-03-06T23:59:59Z"
    targeting:
      common:
